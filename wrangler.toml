# Cloudflare Workers — CMS do blog, servido em certificacaoiso.com.br/acesso
name = "cms-blog-templum-certificacaoiso"
main = "worker.js"
compatibility_date = "2025-01-01"

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

# Rota /acesso*: ADICIONAR NO PAINEL (Worker → Settings → Domains & Routes → Route),
# NÃO aqui — o deploy usa `wrangler versions upload`, que não aplica `routes` do toml.
#   Route: certificacaoiso.com.br/acesso*  ·  Zone: certificacaoiso.com.br

# Variables no painel (Plaintext, públicas) — opcional, já há fallback no código:
#   PUBLIC_SUPABASE_URL, PUBLIC_SUPABASE_ANON_KEY

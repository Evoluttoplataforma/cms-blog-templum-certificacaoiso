# Cloudflare Workers — CMS do blog, servido em certificacaoiso.com.br/acesso
name = "certificacaoiso-cms"
main = "worker.js"
compatibility_date = "2025-01-01"

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

# Rota: liga o /acesso/* deste Worker ao domínio. /acesso* é mais específico que o
# /* do blog → tem precedência para esses paths.
routes = [
  { pattern = "certificacaoiso.com.br/acesso*", zone_name = "certificacaoiso.com.br" }
]

# Variables no painel (Plaintext, públicas) — opcional, já há fallback no código:
#   PUBLIC_SUPABASE_URL, PUBLIC_SUPABASE_ANON_KEY
